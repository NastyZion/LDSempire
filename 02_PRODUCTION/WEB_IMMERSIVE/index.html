<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Laet's Danse Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root { --bg-color: #000; --neon-pink: #ff007f; --glass-bg: rgba(255, 255, 255, 0.08); }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: var(--bg-color); height: 1500vh; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
  
  #canvas-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; background: #000; }
  #canvas { display: block; width: 100%; height: 100%; }
  
  #brand-logo { position: absolute; top: 30px; left: 30px; width: 120px; opacity: 0; transition: opacity 1s; z-index: 100; }
  #fixed-watermark { position: fixed; bottom: 30px; right: 30px; width: 80px; opacity: 0.6; z-index: 100; pointer-events: none; }

  .glass-card {
    position: absolute; background: var(--glass-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
    border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 20px; padding: 2.2rem;
    text-align: center; opacity: 0; pointer-events: none; z-index: 10; width: 420px;
  }
  .glass-card h2 { font-family: 'Roboto', sans-serif; font-weight: 900; text-transform: uppercase; font-size: 2rem; color: var(--neon-pink); margin-bottom: 1.2rem; }
  .glass-card p { font-family: 'Roboto', sans-serif; font-weight: 700; font-size: 1.2rem; color: #fff; line-height: 1.5; }

  .review-card { position: absolute; width: 280px; padding: 1.5rem; z-index: 9; }
  #rev1 { top: 12%; left: 8%; transform: rotate(-2deg); }
  #rev2 { top: 15%; right: 8%; transform: rotate(3deg); }
  #rev3 { bottom: 15%; left: 10%; transform: rotate(-1deg); }

  #card6 { top: 50%; left: 50%; transform: translate(-50%, -50%); width: 480px; z-index: 15; }
  .cta-button { display: inline-block; padding: 16px 28px; background: var(--neon-pink); color: #fff; text-decoration: none; font-family: 'Roboto', sans-serif; font-weight: 900; border-radius: 50px; text-transform: uppercase; margin-top: 20px; }

  #card1 { bottom: 8%; left: 50%; margin-left: -210px; } 
  #card2 { top: 12%; left: 5%; } 
  #card3 { top: 12%; right: 5%; } 
  #card4 { bottom: 12%; right: 5%; } 
  #card5 { bottom: 12%; left: 5%; } 

  @media (max-width: 768px) {
    .glass-card:not(.review-card) { width: 92% !important; left: 4% !important; bottom: 8% !important; top: auto !important; margin: 0 !important; }
    .review-card { display: none; }
    #brand-logo { width: 90px; top: 15px; left: 15px; }
  }
