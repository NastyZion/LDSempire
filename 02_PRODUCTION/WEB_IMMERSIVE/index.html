<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Laet's Danse Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root { --bg-color: #000; --neon-pink: #ff007f; --glass-bg: rgba(255, 255, 255, 0.08); }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: var(--bg-color); height: 1500vh; overflow-x: hidden; }
  
  #canvas-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; background: #000; overflow: hidden; }
  #canvas { display: block; width: 100%; height: 100%; }

  #brand-logo { position: absolute; top: 30px; left: 30px; width: 120px; opacity: 0; z-index: 100; transition: opacity 1s; }
  #fixed-watermark { position: fixed; bottom: 25px; right: 25px; width: 80px; opacity: 0.6; z-index: 999; pointer-events: none; }

  .glass-card {
    position: absolute; background: var(--glass-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
    border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 20px; padding: 2rem;
    text-align: center; opacity: 0; pointer-events: none; z-index: 10; width: 400px;
  }
  .glass-card.active { pointer-events: auto; }
  .glass-card h2 { font-family: 'Roboto', sans-serif; font-weight: 900; text-transform: uppercase; color: var(--neon-pink); }
  .glass-card p { font-family: 'Roboto', sans-serif; font-weight: 700; color: #fff; }

  #card1 { bottom: 10%; left: 50%; transform: translateX(-50%); }
  #card2 { top: 15%; left: 5%; }
  #card3 { top: 15%; right: 5%; }
  #card4 { bottom: 15%; right: 5%; }
  #card5 { bottom: 15%; left: 5%; }
  #card6 { top: 50%; left: 50%; transform: translate(-50%, -50%); width: 450px; }

  .cta-button { display: inline-block; padding: 15px 30px; background: var(--neon-pink); color: #fff; text-decoration: none; font-family: 'Roboto', sans-serif; font-weight: 900; border-radius: 50px; margin-top: 15px; }

  @media (max-width: 768px) {
    .glass-card { width: 90% !important; left: 5% !important; bottom: 10% !important; top: auto !important; transform: none !important; }
  }

  #preloader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
  #preloader-bar { width: 200px; height: 2px; background: #222; }
  #preloader-fill { height: 100%; width: 0%; background: var(--neon-pink); }
</style>
</head>
<body>

<div id="preloader"><div id="preloader-bar"><div id="preloader-fill"></div></div></div>

<img src="03_ASSETS/logo.png" id="brand-logo" alt="Logo">
<img src="03_ASSETS/LOGO_LDS/logo-lds.png" id="fixed-watermark" alt="LDS">

<div id="canvas-container">
  <canvas id="canvas"></canvas>
  <div class="glass-card" id="card1"><h2>La rencontre</h2><p>Deux âmes, un même rythme.</p></div>
  <div class="glass-card" id="card2"><h2>L'envie</h2><p>Le rêve commence à prendre forme.</p></div>
  <div class="glass-card" id="card3"><h2>La demande</h2><p>Un instant suspendu.</p></div>
  <div class="glass-card" id="card4"><h2>Le stress</h2><p>Ne laissez pas le stress gâcher votre moment.</p></div>
  <div class="glass-card" id="card5"><h2>La solution</h2><p>Progrès rapides, intimité totale.</p></div>
  <div class="glass-card" id="card6"><h2>L'apothéose</h2><a href="https://laetsdanse.fr/contact" class="cta-button">Réserver</a></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const totalFrames = 885;
const images = [];
const sequence = { frame: 0 };

function preload() {
  for (let i = 1; i <= totalFrames; i++) {
    const img = new Image();
    img.src = `03_ASSETS/SEQUENCE_FINALE/frame_${String(i).padStart(4, '0')}.webp`;
    images.push(img);
    img.onload = () => {
      const loaded = images.filter(im => im.complete).length;
      document.getElementById('preloader-fill').style.width = (loaded / totalFrames * 100) + '%';
      if (loaded === totalFrames) startApp();
    };
  }
}

function startApp() {
  gsap.to('#preloader', { opacity: 0, duration: 1, onComplete: () => {
    document.getElementById('preloader').style.display = 'none';
    initScroll();
  }});
}

function render() {
  const currentIdx = Math.round(sequence.frame);
  const img = images[currentIdx];
  if (!img) return;

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  
  const canvasRatio = canvas.width / canvas.height;
  const imgRatio = img.width / img.height;
  
  document.getElementById('brand-logo').style.opacity = (currentIdx > 60) ? "1" : "0";

  let dW, dH;
  // MODE COVER : REMPLISSAGE TOTAL SANS BARRES NOIRES
  if (canvasRatio > imgRatio) {
    dW = canvas.width; dH = canvas.width / imgRatio;
  } else {
    dH = canvas.height; dW = canvas.height * imgRatio;
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(img, (canvas.width - dW) / 2, (canvas.height - dH) / 2, dW, dH);
}

function initScroll() {
  gsap.registerPlugin(ScrollTrigger);
  gsap.to(sequence, {
    frame: totalFrames - 1,
    ease: "none",
    scrollTrigger: { trigger: "body", start: "top top", end: "bottom bottom", scrub: 0.1, onUpdate: render }
  });

  const timings = [
    { id: "#card1", s: 65, e: 303 }, { id: "#card2", s: 337, e: 402 },
    { id: "#card3", s: 420, e: 522 }, { id: "#card4", s: 539, e: 618 },
    { id: "#card5", s: 625, e: 727 }, { id: "#card6", s: 785, e: 885 }
  ];

  timings.forEach(t => {
    gsap.timeline({
      scrollTrigger: {
        trigger: "body", 
        start: `${(t.s/totalFrames)*100}% top`, 
        end: `${(t.e/totalFrames)*100}% top`, 
        scrub: true,
        onToggle: self => document.querySelector(t.id).classList.toggle('active', self.isActive)
      }
    }).to(t.id, { opacity: 1, duration: 0.5 }).to(t.id, { opacity: 0, duration: 0.5 });
  });
  render();
}
window.addEventListener('resize', render);
preload();
</script>
</body>
</html>
