<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Laet's Danse Studio – Expérience Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root { 
    --bg-color: #000; 
    --neon-pink: #ff007f; 
    --glass-pink: linear-gradient(135deg, rgba(255, 0, 127, 0.22), rgba(255, 0, 127, 0.05));
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: var(--bg-color); height: 1500vh; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
  
  #canvas-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; background: #000; }
  #canvas { display: block; width: 100%; height: 100%; }
  
  #brand-logo { position: absolute; top: 30px; left: 30px; width: 120px; opacity: 0; transition: opacity 1s; z-index: 100; }
  #fixed-watermark { position: fixed; bottom: 30px; right: 30px; width: 80px; opacity: 0.4; z-index: 100; pointer-events: none; }

  /* --- STYLE GLASS ROSE --- */
  .glass-card {
    position: absolute; background: var(--glass-pink);
    backdrop-filter: blur(25px) saturate(180%); -webkit-backdrop-filter: blur(25px) saturate(180%);
    border: 1px solid rgba(255, 0, 127, 0.4); border-radius: 20px; padding: 2.2rem;
    text-align: center; opacity: 0; pointer-events: none; z-index: 10; width: 420px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 0, 127, 0.1);
  }
  .glass-card h2 { font-family: 'Roboto', sans-serif; font-weight: 900; text-transform: uppercase; font-size: 2.2rem; color: var(--neon-pink); margin-bottom: 1.2rem; text-shadow: 0 0 15px rgba(255, 0, 127, 0.5); }
  .glass-card p { font-family: 'Roboto', sans-serif; font-weight: 700; font-size: 1.2rem; color: #fff; line-height: 1.5; }

  /* Style Avis Mobiles */
  .review-card { position: absolute; width: 320px; padding: 1.8rem; z-index: 9; will-change: transform, opacity; }
  .review-card p { font-size: 1.05rem !important; font-style: italic; }

  /* Card 6 : L'apothéose (Centrée et Fixe) */
  #card6 { top: 50%; left: 50%; transform: translate(-50%, -50%); width: 550px; z-index: 20; padding: 3rem 2rem; }
  
  /* --- URGENCE LINE OPTIMISÉE --- */
  .urgency-tag { 
    display: inline-block !important; 
    background: #000000 !important; 
    color: var(--neon-pink) !important; 
    padding: 8px 18px; border-radius: 50px; font-family: 'Roboto', sans-serif;
    font-weight: 900; font-size: 0.85rem; text-transform: uppercase; margin-bottom: 20px;
    border: 2px solid var(--neon-pink); 
    box-shadow: 0 0 15px rgba(255, 0, 127, 0.5);
  }

  .cta-container { display: flex !important; flex-direction: column; align-items: center; gap: 20px; margin-top: 30px; }
  
  .cta-button { 
    display: inline-block; padding: 18px 35px; background: var(--neon-pink); color: #fff; 
    text-decoration: none; font-family: 'Roboto', sans-serif; font-weight: 900; 
    border-radius: 50px; text-transform: uppercase; font-size: 1rem;
    box-shadow: 0 0 25px rgba(255, 0, 127, 0.5); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  .cta-button:hover { transform: scale(1.05); background: #ff1a8c; box-shadow: 0 0 35px rgba(255, 0, 127, 0.7); }

  .phone-link {
    color: #fff; text-decoration: none; font-family: 'Roboto', sans-serif;
    font-weight: 900; font-size: 1.3rem; display: flex !important; align-items: center; gap: 10px;
    transition: 0.3s;
  }
  .phone-link:hover { color: var(--neon-pink); transform: translateY(-2px); }

  /* --- STYLE BOUTON AUDIO --- */
  #audio-toggle {
    position: fixed; bottom: 30px; left: 30px; z-index: 1000; cursor: pointer;
    background: rgba(0,0,0,0.7); padding: 12px; border-radius: 50%;
    border: 1px solid var(--neon-pink); display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 15px rgba(255, 0, 127, 0.3); opacity: 1;
  }

  /* Positions initiales Parallaxe */
  #rev1 { top: 12%; left: 5%; transform: rotate(-3deg); }
  #rev2 { top: 15%; right: 5%; transform: rotate(4deg); }
  #rev3 { bottom: 18%; left: 8%; transform: rotate(-2deg); }

  #card1 { bottom: 8%; left: 50%; margin-left: -210px; } 
  #card2 { top: 12%; left: 5%; } 
  #card3 { top: 12%; right: 5%; } 
  #card4 { bottom: 12%; right: 5%; } 
  #card5 { bottom: 12%; left: 5%; } 

  @media (max-width: 768px) {
    #card6 { width: 94% !important; padding: 2rem 1rem !important; }
    .glass-card:not(.review-card) { left: 3% !important; bottom: 5% !important; top: auto !important; margin: 0 !important; width: 94% !important; }
    .review-card { display: none !important; }
  }

  #preloader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex;
